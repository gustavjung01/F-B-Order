name: Recipe Version analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fb_order_recipe_version_analysis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fb_order_recipe_version_analysis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fb_order_recipe_version_analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migrate clean database
        run: pnpm db:migrate

      - name: Verify Recipe Version comparison and AI context
        run: |
          set -o pipefail
          pnpm --filter @fb-order/backend test:recipe-version-analysis 2>&1 | tee recipe-version-analysis.log

      - name: Upload Recipe Version analysis log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recipe-version-analysis-log
          path: recipe-version-analysis.log
          if-no-files-found: error
