name: Recipe read API

on:
  push:
    branches:
      - "feat/recipe-read-api"
  pull_request:
    branches:
      - main
      - "feat/recipe-core-schema"

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fb_order_recipe_read
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fb_order_recipe_read"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fb_order_recipe_read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Migrate database
        run: pnpm db:migrate

      - name: Verify Recipe Core schema
        run: pnpm db:verify:recipe-contract

      - name: Verify public Recipe Read API
        run: pnpm test:recipe-read

      - name: Build backend
        run: pnpm run build:backend
