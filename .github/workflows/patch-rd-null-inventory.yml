name: Patch R&D null inventory

on:
  push:
    branches:
      - feat/phase6-recipe-rd
    paths:
      - ".github/workflows/patch-rd-null-inventory.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/phase6-recipe-rd
          fetch-depth: 0

      - name: Apply exact compiler fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          target = Path("apps/backend/src/modules/rd/recipe-rd-content.ts")
          old = 'status: available === undefined ? "unknown" as const : available > 0 ? "available" as const : "unavailable" as const,'
          new = 'status: available == null ? "unknown" as const : available > 0 ? "available" as const : "unavailable" as const,'
          text = target.read_text(encoding="utf-8")
          if text.count(old) != 1:
              raise SystemExit("Expected inventory status expression exactly once")
          target.write_text(text.replace(old, new), encoding="utf-8")
          Path(".github/workflows/patch-rd-null-inventory.yml").unlink()
          PY

      - name: Commit patch and remove helper
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/backend/src/modules/rd/recipe-rd-content.ts .github/workflows/patch-rd-null-inventory.yml
          git commit -m "fix(rd): treat invalid inventory quantity as unknown"
          git push origin HEAD:feat/phase6-recipe-rd
