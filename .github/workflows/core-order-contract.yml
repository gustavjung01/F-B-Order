name: Core order contract

on:
  push:
    branches:
      - "feat/core-order-schema"
      - "agent/**"
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fb_order_phase1
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fb_order_phase1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fb_order_phase1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migrate clean database
        run: |
          set -o pipefail
          pnpm db:migrate 2>&1 | tee migration.log

      - name: Upload migration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-log
          path: migration.log
          if-no-files-found: error

      - name: Seed compatibility data
        run: pnpm db:seed:test

      - name: Re-run migrations
        run: pnpm db:migrate

      - name: Verify customer and order contract
        run: pnpm db:verify:order-contract

      - name: Typecheck
        run: pnpm typecheck

      - name: Verify Phase 7 deploy contract
        run: |
          set -Eeuo pipefail
          bash -n scripts/phase7/deploy-bepsi-backend.sh
          bash -n scripts/phase7/deploy-bepsi-vercel.sh
          node --check scripts/phase7/smoke-production.mjs
          node scripts/phase7/test-deploy-contract.mjs

      - name: Verify approval pricing
        run: pnpm test:auth-pricing

      - name: Import catalog contract fixture
        run: pnpm catalog:import

      - name: Verify catalog contract
        run: |
          set -o pipefail
          pnpm --filter @fb-order/backend exec tsx scripts/test-catalog-contract.ts 2>&1 | tee catalog-contract.log

      - name: Upload catalog contract log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-contract-log
          path: catalog-contract.log
          if-no-files-found: error

      - name: Verify Recipe admin workflow
        run: |
          set -o pipefail
          pnpm --filter @fb-order/backend test:recipe-workflow 2>&1 | tee recipe-workflow.log

      - name: Upload Recipe workflow log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recipe-workflow-log
          path: recipe-workflow.log
          if-no-files-found: error

      - name: Verify AI draft review and Recipe apply workflow
        run: |
          set -o pipefail
          pnpm --filter @fb-order/backend test:ai-draft-workflow 2>&1 | tee ai-draft-workflow.log

      - name: Upload AI draft workflow log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-draft-workflow-log
          path: ai-draft-workflow.log
          if-no-files-found: error

      - name: Verify Recipe scale contract
        run: |
          set -o pipefail
          pnpm --filter @fb-order/backend test:recipe-scale 2>&1 | tee recipe-scale.log

      - name: Upload Recipe scale log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recipe-scale-log
          path: recipe-scale.log
          if-no-files-found: error

      - name: Verify order engine
        run: pnpm --filter @fb-order/backend test:order-engine

      - name: Verify admin operations
        run: pnpm --filter @fb-order/backend exec tsx scripts/test-admin-operations.ts

      - name: Verify frontend backend cutover
        run: pnpm --filter @fb-order/backend exec tsx scripts/test-frontend-cutover.ts
