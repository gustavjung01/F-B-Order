name: Catalog boundary

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit catalog boundary
        run: pnpm catalog:audit

      - name: Validate catalog v2 image and parent shape
        run: |
          set -o pipefail
          pnpm catalog:audit:content:v2 2>&1 | tee catalog-content-audit.log

      - name: Upload catalog content audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-content-audit-log
          path: catalog-content-audit.log
          if-no-files-found: error

      - name: Audit customer copy
        run: pnpm frontend:audit:copy

      - name: Test customer account navigation contract
        run: node --test scripts/frontend/test-customer-account-navigation-contract.mjs

      - name: Test admin catalog readiness
        run: pnpm --filter @fb-order/backend test:admin-products

      - name: Test admin design system contract
        run: node scripts/frontend/test-admin-design-system-contract.mjs

      - name: Test admin Recipe editor contract
        run: node scripts/frontend/test-admin-recipe-editor-contract.mjs

      - name: Test admin Recipe Scale contract
        run: node scripts/frontend/test-admin-recipe-scale-contract.mjs

      - name: Test admin runtime proxy contract
        run: node scripts/frontend/test-admin-runtime-contract.mjs

      - name: Test admin Recipe picker contract
        run: node scripts/frontend/test-admin-recipe-picker-contract.mjs

      - name: Test admin Recipe R2 media contract
        run: node scripts/frontend/test-admin-recipe-media-contract.mjs

      - name: Test admin Recipe operational guards
        run: node scripts/frontend/test-admin-recipe-operational-guards.mjs

      - name: Test Recipe media cleanup schedule
        run: node scripts/frontend/test-recipe-media-cleanup-contract.mjs

      - name: Test admin AI Recipe media and RBAC hotfix
        run: node --test scripts/frontend/test-admin-ai-recipe-hotfix.mjs

      - name: Typecheck
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
          if-no-files-found: error

      - name: Build frontend
        run: pnpm build:frontend
