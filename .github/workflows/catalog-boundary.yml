name: Catalog boundary

on:
  push:
    branches:
      - "refactor/**"
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit catalog boundary
        run: pnpm catalog:audit

      - name: Validate catalog v2 image and parent shape
        run: pnpm catalog:audit:content:v2

      - name: Typecheck
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build:frontend
