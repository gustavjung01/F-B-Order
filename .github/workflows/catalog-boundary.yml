name: Catalog boundary

on:
  push:
    branches:
      - "refactor/**"
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit catalog boundary
        run: pnpm catalog:audit

      - name: Typecheck
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee phase6-typecheck.log

      - name: Upload Phase 6 typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6-typecheck-log
          path: phase6-typecheck.log
          if-no-files-found: error
