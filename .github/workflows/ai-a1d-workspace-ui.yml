name: AI A1d workspace UI

on:
  push:
    branches:
      - feat/ai-a1d-workspace-ui
  pull_request:
    branches:
      - feat/ai-a1c-project-store

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm run build:frontend
