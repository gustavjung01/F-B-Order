name: A0 Google Cloud foundation

on:
  push:
    branches:
      - infra/a0-google-cloud-foundation
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Terraform format
        run: terraform fmt -check -recursive infra/gcp
      - name: Validate bootstrap
        working-directory: infra/gcp/bootstrap
        run: |
          terraform init -backend=false -input=false
          terraform validate -no-color
      - name: Validate foundation
        working-directory: infra/gcp/foundation
        run: |
          terraform init -backend=false -input=false
          terraform validate -no-color
