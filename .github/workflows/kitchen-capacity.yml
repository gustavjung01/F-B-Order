name: Kitchen capacity simulation

on:
  pull_request:
    branches:
      - main
    paths:
      - "db/migrations/027_kitchen_capacity_simulation.sql"
      - "apps/backend/src/modules/kitchen/**"
      - "apps/backend/scripts/test-kitchen-capacity.ts"
      - "apps/backend/package.json"
      - "apps/backend/scripts/migration-plan.mjs"
      - "apps/backend/src/app.ts"
      - "apps/backend/src/modules/auth/auth.permissions.ts"
      - "apps/frontend/components/admin/ai/KitchenCapacitySimulationPanel.tsx"
      - "apps/frontend/app/admin/ai/page.tsx"
      - "apps/frontend/lib/admin-permissions.ts"
      - ".github/workflows/kitchen-capacity.yml"
  push:
    branches:
      - main
    paths:
      - "db/migrations/027_kitchen_capacity_simulation.sql"
      - "apps/backend/src/modules/kitchen/**"
      - "apps/backend/scripts/test-kitchen-capacity.ts"
      - "apps/backend/package.json"
      - "apps/backend/scripts/migration-plan.mjs"
      - "apps/backend/src/app.ts"
      - "apps/backend/src/modules/auth/auth.permissions.ts"
      - "apps/frontend/components/admin/ai/KitchenCapacitySimulationPanel.tsx"
      - "apps/frontend/app/admin/ai/page.tsx"
      - "apps/frontend/lib/admin-permissions.ts"
      - ".github/workflows/kitchen-capacity.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fb_order_phase1
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fb_order_phase1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fb_order_phase1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migrate clean database
        run: pnpm db:migrate

      - name: Backend typecheck
        run: pnpm --filter @fb-order/backend typecheck

      - name: Verify kitchen capacity profile and simulation
        run: |
          set -o pipefail
          pnpm --filter @fb-order/backend test:kitchen-capacity 2>&1 | tee kitchen-capacity.log

      - name: Upload kitchen capacity log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kitchen-capacity-log
          path: kitchen-capacity.log
          if-no-files-found: error

      - name: Frontend typecheck
        run: pnpm --filter @fb-order/frontend typecheck

      - name: Build frontend
        run: pnpm --filter @fb-order/frontend build
