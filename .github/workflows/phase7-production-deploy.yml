name: Phase 7 production deploy

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Paste the full 40-character main commit SHA
        required: true
        type: string
      confirmation:
        description: Type DEPLOY_BEPSI_PRODUCTION
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: bepsi-production-deploy
  cancel-in-progress: false

jobs:
  total-gate:
    name: Total system gate
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.validate-inputs.outputs.target_sha }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fb_order_phase7
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fb_order_phase7"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fb_order_phase7
    steps:
      - name: Validate production confirmation
        id: validate-inputs
        env:
          RAW_TARGET_SHA: ${{ inputs.target_sha }}
          RAW_CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -Eeuo pipefail

          TARGET_SHA="$(printf '%s' "$RAW_TARGET_SHA" \
            | sed -E 's/^[[:space:]]*target_sha[[:space:]]*:[[:space:]]*//I; s/[[:space:]]+$//')"
          CONFIRMATION="$(printf '%s' "$RAW_CONFIRMATION" \
            | sed -E 's/^[[:space:]]*confirmation[[:space:]]*:[[:space:]]*//I; s/[[:space:]]+$//')"

          if [[ ! "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error title=Invalid target_sha::Paste one full lowercase 40-character Git commit SHA. Received length: ${#TARGET_SHA}."
            exit 1
          fi

          if [[ "$CONFIRMATION" != "DEPLOY_BEPSI_PRODUCTION" ]]; then
            echo "::error title=Invalid confirmation::The confirmation field must be exactly DEPLOY_BEPSI_PRODUCTION."
            exit 1
          fi

          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "Production inputs validated for commit $TARGET_SHA"

      - name: Checkout exact target
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.validate-inputs.outputs.target_sha }}
          fetch-depth: 0

      - name: Verify target is latest main
        env:
          TARGET_SHA: ${{ steps.validate-inputs.outputs.target_sha }}
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          git fetch origin main:refs/remotes/origin/main
          if [[ "$(git rev-parse origin/main)" != "$TARGET_SHA" ]]; then
            echo "::error title=Outdated target_sha::target_sha must be the latest commit currently on main."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Phase 7 deploy contract
        run: |
          set -Eeuo pipefail
          bash -n scripts/phase7/deploy-bepsi-backend.sh
          bash -n scripts/phase7/deploy-bepsi-vercel.sh
          node --check scripts/phase7/smoke-production.mjs
          node scripts/phase7/test-deploy-contract.mjs

      - name: Lint all workspaces
        run: pnpm lint

      - name: Typecheck all workspaces
        run: pnpm typecheck

      - name: Build backend
        run: pnpm build:backend

      - name: Migrate clean database
        run: pnpm db:migrate

      - name: Seed compatibility fixture
        run: pnpm db:seed:test

      - name: Verify migration rerun
        run: pnpm db:migrate

      - name: Verify core order contract
        run: pnpm db:verify:order-contract

      - name: Verify approval pricing
        run: pnpm test:auth-pricing

      - name: Import catalog fixture
        run: pnpm catalog:import

      - name: Verify catalog contract
        run: pnpm --filter @fb-order/backend test:catalog-contract

      - name: Verify order engine
        run: pnpm --filter @fb-order/backend test:order-engine

      - name: Verify admin operations
        run: pnpm --filter @fb-order/backend exec tsx scripts/test-admin-operations.ts

      - name: Verify frontend backend cutover
        run: pnpm --filter @fb-order/backend exec tsx scripts/test-frontend-cutover.ts

  deploy-backend:
    name: Deploy Báº¿p Sá»‰ backend
    needs: total-gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure Báº¿p Sá»‰ SSH identity
        env:
          SSH_KEY: ${{ secrets.BEPSI_VPS_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.BEPSI_VPS_KNOWN_HOSTS }}
        run: |
          set -Eeuo pipefail
          test -n "$SSH_KEY"
          test -n "$KNOWN_HOSTS"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/bepsi-production.key"
          chmod 600 "$HOME/.ssh/bepsi-production.key"
          printf '%s\n' "$KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Configure Google Agent Runtime production secret
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          set -Eeuo pipefail
          test -n "$GOOGLE_SERVICE_ACCOUNT_JSON_BASE64"
          umask 077
          cat > "$RUNNER_TEMP/bepsi-google-agent.env" <<EOF
          GOOGLE_CLOUD_PROJECT=bep-si-image-worker
          GOOGLE_CLOUD_LOCATION=us-west1
          GOOGLE_AGENT_ENGINE_ID=710557190426984448
          GOOGLE_AGENT_ENDPOINT=https://us-west1-aiplatform.googleapis.com/v1/projects/bep-si-image-worker/locations/us-west1/reasoningEngines/710557190426984448:streamQuery
          GOOGLE_AGENT_TIMEOUT_MS=90000
          GOOGLE_SERVICE_ACCOUNT_JSON_BASE64=$GOOGLE_SERVICE_ACCOUNT_JSON_BASE64
          EOF
          scp -i "$HOME/.ssh/bepsi-production.key" -o BatchMode=yes -o IdentitiesOnly=yes \
            "$RUNNER_TEMP/bepsi-google-agent.env" ubuntu@40.233.83.234:/tmp/bepsi-google-agent.env
          ssh -i "$HOME/.ssh/bepsi-production.key" -o BatchMode=yes -o IdentitiesOnly=yes \
            ubuntu@40.233.83.234 'sudo bash -s' <<'REMOTE'
          set -Eeuo pipefail
          ENV_FILE=/etc/app-env/bepsi.env
          INCOMING=/tmp/bepsi-google-agent.env
          test -f "$ENV_FILE"
          test -f "$INCOMING"
          TMP_FILE="$(mktemp)"
          trap 'rm -f "$TMP_FILE" "$INCOMING"' EXIT
          awk '!/^(GOOGLE_CLOUD_PROJECT|GOOGLE_CLOUD_LOCATION|GOOGLE_AGENT_ENGINE_ID|GOOGLE_AGENT_ENDPOINT|GOOGLE_AGENT_TIMEOUT_MS|GOOGLE_SERVICE_ACCOUNT_JSON_BASE64)=/' "$ENV_FILE" > "$TMP_FILE"
          cat "$INCOMING" >> "$TMP_FILE"
          install -m 640 -o root -g ubuntu "$TMP_FILE" "$ENV_FILE"
          REMOTE
          rm -f "$RUNNER_TEMP/bepsi-google-agent.env"

      - name: Fetch exact deploy script and release Báº¿p Sá»‰ only
        env:
          TARGET_SHA: ${{ needs.total-gate.outputs.target_sha }}
        run: |
          set -Eeuo pipefail
          ssh \
            -i "$HOME/.ssh/bepsi-production.key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            ubuntu@40.233.83.234 \
            "bash -s -- '$TARGET_SHA'" <<'REMOTE'
          set -Eeuo pipefail
          TARGET_SHA="$1"
          SOURCE_DIR="/srv/apps/bepsi/source"
          DEPLOY_SCRIPT="$(mktemp "/tmp/bepsi-deploy-${TARGET_SHA}.XXXXXX.sh")"
          cleanup() {
            rm -f "$DEPLOY_SCRIPT"
          }
          trap cleanup EXIT

          GIT_COMMON_DIR="$(git -C "$SOURCE_DIR" rev-parse --path-format=absolute --git-common-dir)"
          EXPECTED_GIT_DIR="${SOURCE_DIR}/.git"
          test "$GIT_COMMON_DIR" = "$EXPECTED_GIT_DIR"
          sudo chown -R "$(id -un):$(id -gn)" "$GIT_COMMON_DIR"
          sudo chmod -R u+rwX "$GIT_COMMON_DIR"
          test -w "${GIT_COMMON_DIR}/objects"

          git -C "$SOURCE_DIR" fetch --prune origin main
          test "$(git -C "$SOURCE_DIR" rev-parse refs/remotes/origin/main)" = "$TARGET_SHA"
          git -C "$SOURCE_DIR" show "${TARGET_SHA}:scripts/phase7/deploy-bepsi-backend.sh" > "$DEPLOY_SCRIPT"
          chmod 700 "$DEPLOY_SCRIPT"
          bash "$DEPLOY_SCRIPT" "$TARGET_SHA"
          REMOTE

  deploy-vercel:
    name: Activate Vercel production
    needs:
      - total-gate
      - deploy-backend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout exact target
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.total-gate.outputs.target_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and deploy Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: bash scripts/phase7/deploy-bepsi-vercel.sh "${{ needs.total-gate.outputs.target_sha }}"

  production-smoke:
    name: Production public smoke
    needs:
      - total-gate
      - deploy-vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout smoke script
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.total-gate.outputs.target_sha }}

      - name: Verify public production and auth boundary
        env:
          API_BASE_URL: https://api.bepsi.click
          WEB_BASE_URL: https://bepsi.click
          BEPSI_EXPECTED_BACKEND_VERSION: catalog-v2-backend
        run: node scripts/phase7/smoke-production.mjs
