name: AI A1b gateway

on:
  push:
    branches:
      - feat/ai-a1b-gateway
  pull_request:
    branches:
      - feat/ai-a1a-schema

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fb_order_ai_a1b
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fb_order_ai_a1b"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fb_order_ai_a1b
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fb-order/backend test:ai-schema
      - run: pnpm db:test:migrations
      - run: pnpm db:migrate
      - run: pnpm --filter @fb-order/backend db:verify:ai-schema
      - run: pnpm --filter @fb-order/backend test:ai-gateway
      - run: pnpm --filter @fb-order/backend test:vertex-provider
      - run: pnpm typecheck
      - run: pnpm run build:backend
      - run: pnpm run build:frontend
      - run: terraform fmt -check -recursive infra/gcp
      - working-directory: infra/gcp/foundation
        run: |
          terraform init -backend=false -input=false
          terraform validate -no-color
