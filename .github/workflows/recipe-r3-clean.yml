name: Recipe clean chain

on:
  push:
    branches:
      - "feat/recipe-r3-clean"
  pull_request:
    branches:
      - main
      - "feat/recipe-r2-clean"

jobs:
  validate-r3:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fb_order_recipe_clean
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fb_order_recipe_clean"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fb_order_recipe_clean
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm db:test:migrations
      - run: pnpm db:migrate
      - run: pnpm db:verify:recipe-contract
      - run: pnpm test:recipe-read
      - run: pnpm --filter @fb-order/backend test:recipe-admin
      - run: pnpm run build:backend
      - run: pnpm run build:frontend

  validate-r4:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fb_order_recipe_r4
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fb_order_recipe_r4"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fb_order_recipe_r4
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/recipe-r4-clean
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm db:test:migrations
      - run: pnpm db:migrate
      - run: pnpm db:verify:recipe-contract
      - run: pnpm test:recipe-read
      - run: pnpm run build:backend
      - name: Build frontend
        id: frontend_build
        continue-on-error: true
        run: pnpm run build:frontend > frontend-build.log 2>&1
      - name: Upload frontend build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r4-frontend-build-log
          path: frontend-build.log
      - name: Fail when frontend build failed
        if: steps.frontend_build.outcome == 'failure'
        run: exit 1
