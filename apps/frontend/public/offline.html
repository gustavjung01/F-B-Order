<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ff5a00" />
    <title>Bếp Sỉ F&amp;B đang ngoại tuyến</title>
    <style>
      :root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #fffdf7; color: #0f172a; }
      main { width: min(420px, calc(100% - 40px)); text-align: center; }
      h1 { margin: 0 0 12px; font-size: 28px; }
      p { margin: 0; color: #475569; line-height: 1.6; }
      button { margin-top: 22px; min-height: 48px; padding: 0 22px; border: 0; border-radius: 14px; background: #ff5a00; color: white; font: inherit; font-weight: 800; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <h1>Chưa có kết nối mạng</h1>
      <p>Bếp Sỉ F&amp;B sẽ tải bản mới nhất ngay khi thiết bị kết nối lại Internet.</p>
      <button type="button" onclick="window.location.reload()">Thử lại</button>
    </main>
  </body>
</html>
